<h1>الكاشير</h1>

<!-- العميل -->
<div class="customer-box">
  <button onclick="searchCustomer()">بحث عن عميل</button>
  <button onclick="addCustomer()">إضافة عميل</button>

  <p>اسم العميل: <span id="customerName">نقدي</span></p>
  <p>الرصيد: <span id="customerBalance">0</span></p>
</div>

<!-- بحث عن صنف -->
<input type="text" id="search" placeholder="بحث سريع عن صنف..." oninput="searchProducts()">

<div class="pos-container">

  <!-- المنتجات -->
  <div class="products" id="products"></div>

  <!-- السلة -->
  <div class="cart">

    <table>
      <thead>
        <tr>
          <th>الصنف</th>
          <th>الوحدة</th>
          <th>السعر</th>
          <th>الكمية</th>
          <th>الإجمالي</th>
          <th>حذف</th>
        </tr>
      </thead>

      <tbody id="cart"></tbody>
    </table>

    <h3>الإجمالي: <span id="total">0</span></h3>

    <!-- الدفع -->
    <div class="payment">
      <button onclick="cashSale()">إتمام البيع</button>
      <button onclick="creditSale()">بيع آجل</button>

      <input type="number" id="paid" placeholder="المبلغ المدفوع">
    </div>

  </div>

</div>
