<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>لوحة التحكم</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<h1>لوحة التحكم</h1>

<!-- الكروت -->
<div class="cards">

  <div class="card">
    <h3>العملاء</h3>
    <p id="customers">120</p>
  </div>

  <div class="card">
    <h3>الفواتير</h3>
    <p id="invoices">85</p>
  </div>

  <div class="card">
    <h3>المبيعات</h3>
    <p id="sales">15000</p>
  </div>

  <div class="card">
    <h3>المشتريات</h3>
    <p id="purchases">8000</p>
  </div>

  <div class="card">
    <h3>الديون</h3>
    <p id="debts">3000</p>
  </div>

  <div class="card">
    <h3>التحصيل</h3>
    <p id="collections">2000</p>
  </div>

  <div class="card">
    <h3>المندوبين</h3>
    <p id="agents">6</p>
  </div>

</div>

<!-- آخر الفواتير -->
<div class="table-section">
  <h2>آخر الفواتير</h2>

  <table>
    <thead>
      <tr>
        <th>رقم</th>
        <th>العميل</th>
        <th>المبلغ</th>
        <th>التاريخ</th>
      </tr>
    </thead>

    <tbody id="recentInvoices">
      <tr>
        <td>1</td>
        <td>محمد</td>
        <td>500</td>
        <td>2026-03-22</td>
      </tr>
      <tr>
        <td>2</td>
        <td>أحمد</td>
        <td>300</td>
        <td>2026-03-21</td>
      </tr>
    </tbody>

  </table>
</div>

</body>
</html>
